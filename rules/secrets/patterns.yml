patterns:
  - id: aws-access-key-id
    name: AWS Access Key ID
    severity: critical
    pattern: '\b(AKIA|ASIA|AROA|AGPA|AIDA|ANPA|ANVA|AIPA)[A-Z0-9]{16}\b'
    description: AWS IAM Access Key ID

  - id: aws-secret-access-key
    name: AWS Secret Access Key
    severity: critical
    entropy_threshold: 4.5
    pattern: '(?:aws.{0,20})?(?:secret.{0,20})?[''"`\s]([A-Za-z0-9+/]{40})(?:[''"`]|$)'
    description: AWS IAM Secret Access Key (40-char base64)

  - id: github-token
    name: GitHub Personal Access Token
    severity: critical
    pattern: '\b(ghp_[A-Za-z0-9]{36}|gho_[A-Za-z0-9]{36}|github_pat_[A-Za-z0-9_]{82})\b'
    description: GitHub PAT (classic or fine-grained)

  - id: openai-api-key
    name: OpenAI API Key
    severity: critical
    pattern: '\b(sk-[A-Za-z0-9]{20}T3BlbkFJ[A-Za-z0-9]{20}|sk-proj-[A-Za-z0-9\-_]{80,})\b'
    description: OpenAI API secret key

  - id: anthropic-api-key
    name: Anthropic API Key
    severity: critical
    pattern: '\b(sk-ant-[A-Za-z0-9\-_]{80,})\b'
    description: Anthropic Claude API key

  - id: stripe-secret-key
    name: Stripe Secret Key (live)
    severity: critical
    pattern: '\b(sk_live_[A-Za-z0-9]{24,}|rk_live_[A-Za-z0-9]{24,})\b'
    description: Stripe live mode secret key — full account access

  - id: stripe-test-key
    name: Stripe Test Key
    severity: medium
    pattern: '\b(sk_test_[A-Za-z0-9]{24,})\b'
    description: Stripe test mode key — lower risk but should not be in source

  - id: database-url
    name: Database URL with Credentials
    severity: critical
    pattern: '(postgres|postgresql|mysql|mongodb(?:\+srv)?|redis|mssql):\/\/[^:]+:[^@]+@[^\s''"]*'
    description: Database connection URL containing username and password

  - id: private-key-pem
    name: Private Key (PEM)
    severity: critical
    pattern: '-----BEGIN (?:RSA |EC |DSA |OPENSSH )?PRIVATE KEY-----'
    description: PEM-encoded private key block

  - id: sendgrid-api-key
    name: SendGrid API Key
    severity: high
    pattern: '\b(SG\.[A-Za-z0-9_\-]{22}\.[A-Za-z0-9_\-]{43})\b'
    description: SendGrid email API key

  - id: slack-token
    name: Slack API Token
    severity: high
    pattern: '\b(xox[baprs]-[A-Za-z0-9\-]{10,})\b'
    description: Slack bot/app/user OAuth token

  - id: firebase-api-key
    name: Firebase API Key
    severity: high
    pattern: 'AIza[0-9A-Za-z\-_]{35}'
    description: Google Firebase/GCP API key

  - id: npm-token
    name: NPM Access Token
    severity: high
    pattern: '\b(npm_[A-Za-z0-9]{36})\b'
    description: npm automation or publish token

  - id: jwt-secret
    name: JWT Secret
    severity: high
    pattern: '(?:jwt[_-]?secret|jwt[_-]?key|token[_-]?secret)\s*[=:]\s*[''"]([^''"]{"8,})[''"]'
    description: JWT signing secret key

  - id: generic-api-key
    name: Generic API Key
    severity: high
    entropy_threshold: 4.0
    pattern: '(?:api[_-]?key|apikey|api[_-]?secret)\s*[=:]\s*[''"]([A-Za-z0-9\-_]{16,})[''"]'
    description: Generic API key or secret assignment

false_positive_filters:
  - placeholder strings: ['xxx', 'placeholder', 'changeme', 'your-', 'example', 'sample']
  - test files: ['*.test.ts', '*.spec.ts', '__tests__/', '__mocks__/']
  - lock files: ['package-lock.json', 'yarn.lock', 'pnpm-lock.yaml']
  - env templates: ['.env.example', '.env.sample', '.env.template']
